name: FEOSYNC CI
permissions:
  contents: write
  discussions: write
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
      build:
        runs-on: ubuntu-latest
        environment: env

        steps:
          - name: starting ci
            run: echo "Starting ..."
          
          - name: Checkout code
            uses: actions/checkout@v3

          - name: login to docker hub
            uses: docker/login-action@v2
            with:
              username: ${{ secrets.DOCKER_USERNAME }}
              password: ${{ secrets.DOCKER_PASSWORD }}
          
          - name: Build and push Server image
            uses: docker/build-push-action@v3
            with:
              context: ./server
              push: true
              tags: ${{ secrets.DOCKER_USERNAME }}/feosync-server:latest
          
          - name: Build and push Client image
            uses: docker/build-push-action@v3
            with:
              context: ./client
              push: true
              tags: ${{ secrets.DOCKER_USERNAME }}/feosync-client:latest

            
          