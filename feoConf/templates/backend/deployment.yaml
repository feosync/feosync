apiVersion: apps/v1
kind: Deployment
metadata:
    name: {{ .Values.backend.name }}
    labels:
        app: {{ .Values.backend.labels.app }}
spec:
    replicas: 1
    selector:
        matchLabels:
            app: {{ .Values.backend.labels.app }}
    template:
        metadata:
            labels:
                app: {{ .Values.backend.labels.app }}
        spec:
            containers:
                - name: {{ .Values.backend.name }}
                  image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
                  imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
                  ports:
                    - containerPort: {{ .Values.backend.containerPort }}
                  env:
                   {{- range $key, $value := .Values.backend.service.env }}
                    - name: {{ $key }}
                      value: "{{ $value }}"
                   {{- end }}
            imagePullSecrets:
                - name: regcred