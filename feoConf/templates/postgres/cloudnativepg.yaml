apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: {{ .Values.postgres.name }}
  namespace: {{ .Values.namespaces.data }}
spec:
  instances: {{ .Values.postgres.instances }}

  storage:
    storageClass: {{ .Values.postgres.storageClass }}          # Adapter selon ton cluster (gp2, manual, etc.)
    size: {{ .Values.postgres.storage }}

  bootstrap:
    initdb:
        database: {{ .Values.postgres.database }}
        owner: {{ .Values.postgres.user }}
        secret:
            name: feosync-db-secret