version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: feosync_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: feosync_db
      POSTGRES_USER: feosync
      POSTGRES_PASSWORD: feosync_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U feosync -d feosync_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: feosync_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: feosync_api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://feosync:feosync_pass@postgres:5432/feosync_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./:/app
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn src.app.main:app --host 0.0.0.0 --port 8000 --reload
      "

  # ── Celery Worker ───────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: feosync_worker
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://feosync:feosync_pass@postgres:5432/feosync_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: >
      celery -A src.app.workers.celery_app.celery_app worker
      --loglevel=info
      --queues=publishing,analytics,scheduler,sync
      --concurrency=4

  # ── Celery Beat (cron scheduler) ─────────────────────────────────────────────
  beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: feosync_beat
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://feosync:feosync_pass@postgres:5432/feosync_db
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      - redis
      - postgres
    command: >
      celery -A src.app.workers.celery_app.celery_app beat
      --loglevel=info
      --scheduler celery.beat.PersistentScheduler

  # ── Flower (Celery monitoring) ───────────────────────────────────────────────
  flower:
    image: mher/flower:2.0
    container_name: feosync_flower
    restart: unless-stopped
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      FLOWER_PORT: 5555
    ports:
      - "5555:5555"
    depends_on:
      - redis
    profiles:
      - monitoring

  # ── Nginx (reverse proxy) ───────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: feosync_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx_certs:/etc/nginx/certs
    depends_on:
      - api
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  nginx_certs:
